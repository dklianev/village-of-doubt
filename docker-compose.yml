services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      PUBLIC_WEB_DOMAIN: ${PUBLIC_WEB_DOMAIN}
      PUBLIC_WS_DOMAIN: ${PUBLIC_WS_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
      - game

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://werewolf:${DB_PASSWORD}@postgres:5432/werewolf
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      GAME_TOKEN_SECRET: ${GAME_TOKEN_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      NEXT_PUBLIC_GAME_SERVER_URL: wss://${PUBLIC_WS_DOMAIN}
    depends_on:
      postgres:
        condition: service_healthy

  game:
    build:
      context: .
      dockerfile: apps/game-server/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://werewolf:${DB_PASSWORD}@postgres:5432/werewolf
      GAME_TOKEN_SECRET: ${GAME_TOKEN_SECRET}
      GAME_SERVER_PORT: 2567
      ALLOW_DEV_AUTH: "false"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: werewolf
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: werewolf
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U werewolf"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
