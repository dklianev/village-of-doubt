name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: werewolf_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run migrations
        run: pnpm --filter @werewolf/database db:migrate
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/werewolf_test

      - name: Verify
        run: pnpm verify
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/werewolf_test
          BETTER_AUTH_SECRET: ci-only-secret-that-is-long-enough-32-chars-min
          GAME_TOKEN_SECRET: ci-only-secret-that-is-long-enough-32-chars-min
          OAUTH_MOCK: "true"

      - name: Upload visual diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-results
          path: test-results/visual
          if-no-files-found: ignore
